name: Build & Deploy FastAPI to Azure

on:
  push:
    branches: ["main"]
    paths:
      - "apps/api/**"
  workflow_dispatch:

env:
  DOCKER_IMAGE: mfalana/hwc-crawfordsville-api
  CONTAINER_NAME: hwc-crawfordsville-api

concurrency:
  group: dockerhub-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push (latest + sha)
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          push: true
          tags: |
            docker.io/${{ env.DOCKER_IMAGE }}:${{ github.sha }}
            docker.io/${{ env.DOCKER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create or Update Azure Container App
        run: |
          echo "Checking if Container App exists..."
          
          # Check if container app exists
          if az containerapp show --name ${{ env.CONTAINER_NAME }} --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} >/dev/null 2>&1; then
            echo "Container App exists, updating..."
            az containerapp update \
              --name ${{ env.CONTAINER_NAME }} \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --image docker.io/${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          else
            echo "Container App doesn't exist, creating..."
            
            # Get or create container app environment
            ENV_NAME="${{ env.CONTAINER_NAME }}-env"
            if ! az containerapp env show --name $ENV_NAME --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} >/dev/null 2>&1; then
              echo "Creating Container App Environment..."
              az containerapp env create \
                --name $ENV_NAME \
                --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
                --location eastus
            fi
            
            # Create the container app
            az containerapp create \
              --name ${{ env.CONTAINER_NAME }} \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --environment $ENV_NAME \
              --image docker.io/${{ env.DOCKER_IMAGE }}:${{ github.sha }} \
              --target-port 8000 \
              --ingress external \
              --min-replicas 0 \
              --max-replicas 3 \
              --cpu 0.25 \
              --memory 0.5Gi \
              --env-vars PORT=8000
          fi
          
          echo "Deployment completed successfully!"
          echo "Image: docker.io/${{ env.DOCKER_IMAGE }}:${{ github.sha }}"